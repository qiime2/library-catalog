name: lint-pr

# Run on PR changing files in plugins dir against main
on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'plugins/**.yml'
  workflow_dispatch:

jobs:
  lint-yml:
    runs-on: ubuntu-latest
    outputs:
      ENV_FILES: ${{ steps.lint.outputs.ENV_FILES }}

    steps:
      # Checkout new commit and prior HEAD
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Get diff
      # This feels odd to me got it from
      # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/workflow-commands-for-github-actions#multiline-strings
      - name: Get Diff
        run: |
          {
            echo 'DIFF<<EOF'
            git diff --name-only HEAD~ HEAD
            echo EOF
          } >> "$GITHUB_ENV"

      # Lint all plugins/** files in diff (filtering of diff occurs in Python)
      # Also gets all env files in added plugins for env testing
      - name: Lint Yml and Get Env Files
        id: lint
        run: python .github/scripts/lint.py ${{ secrets.GITHUB_TOKEN }} $DIFF

  build-test-matrix:
    needs: lint-yml
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Checkout library-catalog
        uses: actions/checkout@v4

      - name: Checkout distributions
        uses: actions/checkout@v4
        with:
          repository: qiime2/distributions
          ref: dev
          path: distributions

      - name: Build test matrix
        id: build-matrix
        run: |
          python .github/scripts/build_test_matrix.py \
            '${{ needs.lint-yml.outputs.ENV_FILES }}' \
            ./distributions

  # Install all envs found and at least make sure `qiime info` runs.
  test-envs:
    needs: build-test-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-test-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner_label }}
    env:
      prefix: ./test

    steps:
      - name: Set up Miniconda
        # Replaces conda-incubator/setup-miniconda@v3
        uses: qiime2-cutlery/setup-miniconda@v3
        with:
          activate-environment: ''
          architecture: ${{ matrix.conda_architecture }}
          auto-activate-base: true
          miniconda-version: 'latest'

      - name: Download environment file
        run: curl -sSL '${{ matrix.url }}' -o env.yml

      # Hacky stuff to make it so I can activate the conda env for testing
      - name: Set up Test Environment
        run: |
          conda env create -y -p ${{ env.prefix }} -f env.yml
          mkdir -p ${{ env.prefix }}/etc
          cat <<EOF > '${{ env.prefix }}/etc/activate.sh'
            . "$CONDA/etc/profile.d/conda.sh"
            conda activate '${{ env.prefix }}'
          EOF
          chmod +x 'test/etc/activate.sh'

      - name: Test
        run: |
          source ${{ env.prefix }}/etc/activate.sh
          conda activate ${{ env.prefix }}
          qiime info
